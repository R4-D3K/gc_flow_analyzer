{% extends "base.html" %}
{% block title %}Login — GC Flow Analyzer{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-24">
  <div class="text-center mb-8">
    <h1 class="text-2xl font-bold text-white mb-1">GC Flow Analyzer</h1>
    <p class="text-gray-500 text-sm">Enter your access password to continue.</p>
  </div>

  {% if error %}
  <div class="card border-red-800 bg-red-950 text-red-300 px-4 py-3 mb-4 flex items-center gap-2">
    <span>&#9888;</span><span>{{ error }}</span>
  </div>
  {% endif %}

  <div class="card p-6">
    <form method="POST" action="{{ root }}/login">
      <label class="block text-gray-400 text-xs mb-1 uppercase tracking-wider">Password</label>
      <input type="password" name="password" required autofocus
             class="w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-white
                    focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" />
      <button type="submit"
              class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold
                     rounded px-4 py-2 transition-colors duration-150">
        Sign in
      </button>
    </form>
  </div>
</div>
{% endblock %}
