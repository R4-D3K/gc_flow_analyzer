version: "3.9"

services:
  gc-flow-analyzer:
    image: gc-flow-analyzer:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gc-flow-analyzer
    restart: unless-stopped
    ports:
      - "8765:8000"
    volumes:
      - /volume1/docker/gc-flow-analyzer/data:/app/data:ro
    env_file:
      - .env.prod
    environment:
      - APP_HOST=0.0.0.0
      - ORGS_FILE=/app/data/orgs.yaml
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
